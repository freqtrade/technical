name: Technical CI

on:
  push:
    branches:
      - main
      - ci/*
    tags:
  release:
    types: [published]
  pull_request:
  schedule:
    - cron:  '0 5 * * 4'


concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ "ubuntu-22.04", "ubuntu-24.04", "macos-14", "macos-15", "windows-2022", "windows-2025" ]
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        activate-environment: true
        enable-cache: true
        python-version: ${{ matrix.python-version }}
        cache-dependency-glob: "requirements**.txt"
        cache-suffix: "${{ matrix.python-version }}"

    - name: Installation - *nix
      run: |
        uv pip install -r requirements-dev.txt
        uv pip install -e .

    - name: Tests
      run: |
        pytest --random-order --cov=technical --cov-config=.coveragerc

    - name: Run Ruff
      run: |
        ruff check --output-format=github .

    - name: Run Ruff format check
      run: |
        ruff format --check

    - name: Run Codespell
      run: |
        codespell

    - name: Sort imports (isort)
      run: |
        isort --check .

    - name: Discord notification
      uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # v1.16.0
      if: failure() && ( github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
      with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }} # zizmor: ignore[secrets-outside-env] Intentionally not using environment variable.
          color: '#ff0000'  # red
          title: Technical CI failed on ${{ matrix.os }}

  # Notify on discord only once - when CI completes (and after deploy) in case it's successful
  notify-complete:
    name: Notify Discord on CI completion
    needs: [ test ]
    runs-on: ubuntu-latest
    # Discord notification can't handle schedule events
    if: (github.event_name != 'schedule')
    steps:

    - name: Discord notification
      uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # v1.16.0
      if: (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
      with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }} # zizmor: ignore[secrets-outside-env] Intentionally not using environment variable.
          color: '#0000ff'  # blue
          title: Technical CI

  build:
    name: Build Python 🐍 distribution 📦
    if: always()
    needs: [ test ]
    runs-on: ubuntu-22.04
    steps:
    - name: Decide whether the needed jobs succeeded or failed
      uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe  # v1.2.2
      with:
        jobs: ${{ toJSON(needs) }}

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        activate-environment: true
        enable-cache: true
        python-version: 3.13
        cache-dependency-glob: "requirements**.txt"
        cache-suffix: "build-3.13"


    - name: Extract branch name
      id: extract-branch
      run: |
        echo "GITHUB_REF='${GITHUB_REF}'"
        echo "branch=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"

    - name: Build distribution
      run: |
        uv pip install -U build
        python -m build --sdist --wheel

    - name: Upload artifacts 📦
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: technical
        path: |
          dist
        retention-days: 10

  deploy-test-pypi:
    name: "Publish Python 🐍 distribution 📦 to TestPyPI"
    if: (github.event_name == 'release') && github.repository == 'freqtrade/technical'
    needs: [ build ]
    runs-on: ubuntu-22.04
    environment:
      name: pypi-test
      url: https://test.pypi.org/p/technical
    permissions:
      id-token: write  # needed for pypi publish action

    steps:

    - name: Download artifact  📦
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: technical
        path: dist
        merge-multiple: true

    - name: Publish to PyPI (Test)
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
      if: (github.event_name == 'release')
      with:
        repository-url: https://test.pypi.org/legacy/

  deploy-pypi:
    name: "Publish Python 🐍 distribution 📦 to PyPI"
    if: (github.event_name == 'release') && github.repository == 'freqtrade/technical'
    needs: [ build ]
    runs-on: ubuntu-22.04
    environment:
      name: pypi
      url: https://pypi.org/p/technical
    permissions:
      id-token: write  # needed for pypi publish action

    steps:

    - name: Download artifact  📦
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: technical
        path: dist
        merge-multiple: true

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

    - name: Discord notification
      uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # v1.16.0
      if: always() && ( github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
      with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }} # zizmor: ignore[secrets-outside-env] Intentionally not using environment variable.
          color: '#00ff00'  # green
          title: Technical CI Deploy
